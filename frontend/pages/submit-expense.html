<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Expense | ERMS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
</head>
<body>
    <nav class="container-fluid" id="main-nav"></nav>
    <main class="container">
        <h1>Submit Expense Claim</h1>
        <article>
            <form id="expenseForm">
                <label for="receipt">Upload Receipt (OCR will auto-fill fields)</label>
                <input type="file" id="receipt" name="receipt" accept="image/*" required>
                <small id="ocrStatus"></small>

                <div class="grid">
                    <div>
                        <label for="amount">Amount</label>
                        <input type="number" id="amount" name="amount" step="0.01" required>
                    </div>
                    <div>
                        <label for="originalCurrency">Currency</label>
                        <select id="originalCurrency" name="originalCurrency" required>
                            <option value="USD">USD</option>
                            <option value="EUR">EUR</option>
                            <option value="GBP">GBP</option>
                            <option value="JPY">JPY</option>
                            <option value="INR">INR</option>
                        </select>
                    </div>
                </div>

                <div class="grid">
                    <div>
                        <label for="category">Category</label>
                        <input type="text" id="category" name="category" placeholder="Travel, Food, Office..." required>
                    </div>
                    <div>
                        <label for="date">Date</label>
                        <input type="date" id="date" name="date" required>
                    </div>
                </div>

                <label for="description">Description</label>
                <textarea id="description" name="description" placeholder="Purpose of this expense..."></textarea>

                <button type="submit">Submit Claim</button>
            </form>
        </article>
    </main>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/expense.js"></script>
</body>
</html>
